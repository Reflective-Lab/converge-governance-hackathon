[package]
name = "governance-desktop"
version = "0.1.0"
edition = "2021"

[workspace]

[lib]
name = "governance_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
converge-provider = { path = "../../../../converge.zone/crates/provider", features = ["kong"] }
converge-tool = { path = "../../../../converge.zone/crates/tool" }
dotenv = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }

[features]
default = []
