[package]
name = "governance-desktop"
version = "0.1.0"
edition = "2024"

[workspace]

[lib]
name = "governance_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
converge-core = { path = "../../../../converge/crates/core" }
converge-provider = { path = "../../../../converge/crates/provider", default-features = false, features = ["anthropic", "gemini", "openai", "openrouter", "mistral"] }
converge-axiom = { path = "../../../../converge/crates/tool" }
dotenv = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }

[features]
default = []
