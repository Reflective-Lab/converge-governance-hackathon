[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.94"

[workspace.dependencies]
# Converge v3.4.0 (local path until tagged)
converge-core = { path = "../converge/crates/core" }
converge-pack = { path = "../converge/crates/pack" }
converge-kernel = { path = "../converge/crates/kernel" }
converge-model = { path = "../converge/crates/model" }
converge-provider-api = { path = "../converge/crates/provider-api" }
converge-domain = { path = "../converge/crates/domain" }
converge-policy = { path = "../converge/crates/policy" }
converge-provider = { path = "../converge/crates/provider", default-features = false, features = ["anthropic", "gemini", "openai", "mistral", "brave", "tavily", "kong"] }
# Organism (latest main, pinned to converge v3.3.1)
organism-pack = { git = "https://github.com/Reflective-Lab/organism", branch = "main" }
organism-runtime = { git = "https://github.com/Reflective-Lab/organism", branch = "main" }
organism-planning = { git = "https://github.com/Reflective-Lab/organism", branch = "main" }

# Axiom v0.5.0 (local path until published)
axiom-truth = { path = "../axiom" }

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
dotenv = "0.15"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
