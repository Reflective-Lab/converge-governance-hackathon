[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
# Converge
converge-core = "3.0.0"
converge-domain = "3.0.0"
converge-policy = "3.0.0"

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Local path overrides until converge v3.0.0 is published to crates.io
[patch.crates-io]
converge-core = { path = "../converge/crates/core" }
converge-domain = { path = "../converge/crates/domain" }
converge-pack = { path = "../converge/crates/pack" }
converge-policy = { path = "../converge/crates/policy" }
converge-provider-api = { path = "../converge/crates/provider-api" }
