[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.94"

[workspace.dependencies]
# Converge — all crates from crates.io at the same version
converge-core = "3.2.1"
converge-pack = "3.2.1"
converge-kernel = "3.2.1"
converge-provider-api = "3.2.1"
converge-domain = "3.2.1"
converge-policy = "3.2.1"
converge-provider = { version = "3.2.1", default-features = false, features = ["anthropic", "gemini", "openai", "mistral", "brave", "tavily", "kong"] }
# Organism
organism-pack = "1.0.0"
organism-runtime = "1.0.0"
organism-planning = "1.0.0"

# Axiom
axiom-truth = "0.4.1"

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
dotenv = "0.15"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

