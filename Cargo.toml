[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.94"

[workspace.dependencies]
# Converge — from GitHub for faster iteration
converge-core = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-pack = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-kernel = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-provider-api = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-domain = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-policy = { git = "https://github.com/Reflective-Lab/converge.git" }
converge-provider = { git = "https://github.com/Reflective-Lab/converge.git", default-features = false, features = ["anthropic", "gemini", "openai", "mistral", "brave", "tavily", "kong"] }
# Organism — from GitHub for faster iteration
organism-pack = { git = "https://github.com/Reflective-Lab/organism.git" }
organism-runtime = { git = "https://github.com/Reflective-Lab/organism.git" }
organism-planning = { git = "https://github.com/Reflective-Lab/organism.git" }

# Axiom
axiom-truth = "0.4.1"

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
dotenv = "0.15"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

