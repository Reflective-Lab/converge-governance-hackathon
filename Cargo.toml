[workspace]
members = ["crates/*"]
exclude = ["local/converge"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"

[workspace.dependencies]
# Converge v3.7.3 (local upstream worktree)
converge-core = { path = "local/converge/crates/core" }
converge-pack = { path = "local/converge/crates/pack" }
converge-kernel = { path = "local/converge/crates/kernel" }
converge-model = { path = "local/converge/crates/model" }
converge-provider-api = { path = "local/converge/crates/provider-api" }
converge-domain = { path = "local/converge/crates/domain" }
converge-policy = { path = "local/converge/crates/policy" }
converge-provider = { path = "local/converge/crates/provider", default-features = false, features = ["anthropic", "gemini", "openai", "openrouter", "mistral", "brave", "tavily", "kong"] }

# Organism v1.4.0 (local checkout)
organism-pack = { path = "../../work/organism/crates/pack" }
organism-runtime = { path = "../../work/organism/crates/runtime" }
organism-planning = { path = "../../work/organism/crates/planning" }

# Axiom v0.7.0 (local checkout)
axiom-truth = { path = "../../work/axiom" }

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
dotenv = "0.15"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
