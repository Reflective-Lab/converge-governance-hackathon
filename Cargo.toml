[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.94"

[workspace.dependencies]
# Converge v3.4.0
converge-core = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-pack = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-kernel = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-model = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-provider-api = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-domain = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-policy = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-provider = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0", default-features = false, features = ["anthropic", "gemini", "openai", "mistral", "brave", "tavily", "kong"] }

# Organism v1.2.0 (aligned with converge v3.4.0)
organism-pack = { git = "https://github.com/Reflective-Lab/organism", tag = "v1.2.0" }
organism-runtime = { git = "https://github.com/Reflective-Lab/organism", tag = "v1.2.0" }
organism-planning = { git = "https://github.com/Reflective-Lab/organism", tag = "v1.2.0" }

# Axiom v0.6.0 (aligned with converge v3.4.0)
axiom-truth = { git = "https://github.com/Reflective-Lab/axiom", tag = "v0.6.0" }

# Server
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
dotenv = "0.15"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
